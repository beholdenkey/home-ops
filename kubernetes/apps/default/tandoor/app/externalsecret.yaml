---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tandoor
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: tandoor-secret
    template:
      data:
        SECRET_KEY: "{{ .TANDOOR_SECRET_KEY }}"
        DB_ENGINE: "django.db.backends.postgresql"
        POSTGRES_HOST: "postgres18-rw.database.svc.cluster.local"
        POSTGRES_PORT: "5432"
        POSTGRES_DB: "tandoor"
        POSTGRES_USER: "tandoor"
        POSTGRES_PASSWORD: "{{ .POSTGRES_PASSWORD }}"
        EMAIL_HOST: "smtp-relay.default.svc.cluster.local"
        EMAIL_PORT: "25"
        EMAIL_USE_TLS: "0"
        EMAIL_USE_SSL: "0"
        DEFAULT_FROM_EMAIL: "noreply@beholdenkey.dev"
        ACCOUNT_EMAIL_SUBJECT_PREFIX: "[Tandoor Recipes] "
        ALLOWED_HOSTS: "tandoor.beholdenkey.dev"
        CSRF_TRUSTED_ORIGINS: "https://tandoor.beholdenkey.dev"
  dataFrom:
    - extract:
        key: tandoor
