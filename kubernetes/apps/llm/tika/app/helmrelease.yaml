---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/source.toolkit.fluxcd.io/helmrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: tika
spec:
  interval: 1h
  url: https://apache.jfrog.io/artifactory/tika
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tika
spec:
  interval: 15m
  chart:
    spec:
      chart: tika
      version: 3.2.2
      sourceRef:
        kind: HelmRepository
        name: tika
  values:
    replicaCount: 1
    image:
      repository: apache/tika
      pullPolicy: IfNotPresent
      tag: "3.2.3.0-full@sha256:21d8052de04e491ccf66e8680ade4da6f3d453a56d59f740b4167e54167219b7"
    env:
      - name: TIKA_SERVER_JAVA_OPTS
        value: "-Xms512m -Xmx1536m"
    resources:
      limits:
        cpu: "2"
        memory: 2000Mi
      requests:
        cpu: "1"
        memory: 1500Mi
    autoscaling:
      apiVersion: autoscaling/v2
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
    networkPolicy:
      enabled: true
      allowExternal: false

    config:
      base_url: "http://localhost/"
