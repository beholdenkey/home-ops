---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: docling
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: docling
  values:
    global:
      fullnameOverride: docling
    controllers:
      docling:
        type: deployment
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          docling:
            image:
              repository: ghcr.io/docling-project/docling-serve-cpu
              tag: v1.15.0@sha256:3072c67d83345d0cac1bb0d9488d62b4d0b8d36bfb56a9698c1b55dbaf85e9fd
            env:
              TZ: America/New_York
              DOCLING_SERVE_ENABLE_UI: "true"
              DOCLING_SERVE_ENG_KIND: "rq"
              DOCLING_SERVE_ENG_RQ_REDIS_URL: "redis://dragonfly.database.svc.cluster.local:6379/4"
              DOCLING_SERVE_ARTIFACTS_PATH: "/modelcache"
              DOCLING_SERVE_MAX_SYNC_WAIT: "600"
              HF_HOME: "/modelcache/huggingface"
              HF_HUB_CACHE: "/modelcache/huggingface/hub"
              HF_XET_CACHE: "/modelcache/huggingface/xet"
              XDG_CACHE_HOME: "/modelcache/.cache"
              HF_HUB_DISABLE_XET: "1"
            ports:
              - containerPort: &port 5001
                name: http
            probes:
              liveness: &httpProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: http
              readiness: *httpProbe
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                cpu: 1
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch

      worker:
        type: deployment
        replicas: null
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          docling:
            image:
              repository: ghcr.io/docling-project/docling-serve-cpu
              tag: v1.15.0@sha256:3072c67d83345d0cac1bb0d9488d62b4d0b8d36bfb56a9698c1b55dbaf85e9fd
            command:
              - docling-serve
            args:
              - rq-worker
            env:
              TZ: America/New_York
              DOCLING_SERVE_ENG_KIND: "rq"
              DOCLING_SERVE_ENG_RQ_REDIS_URL: "redis://dragonfly.database.svc.cluster.local:6379/4"
              DOCLING_SERVE_ARTIFACTS_PATH: "/modelcache"
              HF_HOME: "/modelcache/huggingface"
              HF_HUB_CACHE: "/modelcache/huggingface/hub"
              HF_XET_CACHE: "/modelcache/huggingface/xet"
              XDG_CACHE_HOME: "/modelcache/.cache"
              HF_HUB_DISABLE_XET: "1"
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                cpu: 2
                memory: 8Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
    service:
      docling:
        controller: docling
        ports:
          http:
            port: *port
    route:
      docling:
        hostnames:
          - "docling.beholdenkey.dev"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      cache:
        type: persistentVolumeClaim
        accessMode: ReadWriteMany
        size: 50Gi
        storageClass: nfs-rwx
        suffix: cache
        globalMounts:
          - path: /modelcache
      hf-cache:
        type: emptyDir
        globalMounts:
          - path: /opt/app-root/src/.cache
      easyocr:
        type: emptyDir
        globalMounts:
          - path: /opt/app-root/src/.EasyOCR
      run:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
