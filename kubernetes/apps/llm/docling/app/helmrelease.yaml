---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: docling
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: docling
  values:
    controllers:
      docling:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          docling:
            image:
              repository: ghcr.io/docling-project/docling-serve-cpu
              tag: v1.14.3@sha256:69128b02c50317e6b9f96889e07a8a71b1f21bf07e40bb086dba688edefa7c7d
            env:
              TZ: America/New_York
              DOCLING_SERVE_ENABLE_UI: "true"
              DOCLING_SERVE_ENG_KIND: "rq"
              DOCLING_SERVE_ENG_RQ_REDIS_URL: "redis://dragonfly.database.svc.cluster.local:6379/4"
              DOCLING_SERVE_ARTIFACTS_PATH: "/modelcache"
              DOCLING_SERVE_MAX_SYNC_WAIT: "600"
            ports:
              - containerPort: &port 5001
                name: http
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: http
              readiness: *probes
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                cpu: 1
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch

      docling-worker:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          docling:
            image:
              repository: ghcr.io/docling-project/docling-serve-cpu
              tag: v1.14.3@sha256:69128b02c50317e6b9f96889e07a8a71b1f21bf07e40bb086dba688edefa7c7d
            command:
              - docling-serve
            args:
              - rq-worker
            env:
              TZ: America/New_York
              DOCLING_SERVE_ENG_KIND: "rq"
              DOCLING_SERVE_ENG_RQ_REDIS_URL: "redis://dragonfly.database.svc.cluster.local:6379/4"
              DOCLING_SERVE_ARTIFACTS_PATH: "/modelcache"
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                cpu: 2
                memory: 8Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch

    service:
      docling:
        controller: docling
        ports:
          http:
            port: *port

    persistence:
      cache:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 50Gi
        storageClass: ceph-rbd
        suffix: cache
        globalMounts:
          - path: /modelcache
      run:
        type: emptyDir
        medium: Memory
        sizeLimit: 128Mi
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 128Mi
