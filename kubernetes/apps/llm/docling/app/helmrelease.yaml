---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/refs/heads/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: docling
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: docling
  values:
    controllers:
      docling:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          docling:
            image:
              repository: ghcr.io/docling-project/docling-serve-cu128
              tag: v1.14.1@sha256:e4773b51bbef96d60b5336dfe8b20f7e214455e879e8d6fada4b5be8db899922
            env:
              DOCLING_DEVICE: cuda
              DOCLING_SERVE_MAX_SYNC_WAIT: 600
              TZ: America/New_York
            ports:
              - containerPort: &port 5001
                name: http
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: http
              readiness: *probes
            resources:
              limits:
                nvidia.com/gpu: 1
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              readOnlyRootFilesystem: true
        pod:
          runtimeClassName: nvidia
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
            fsGroupChangePolicy: OnRootMismatch
    service:
      docling:
        ports:
          http:
            port: *port
    persistence:
      cache:
        accessMode: ReadWriteOnce
        size: 100Gi
        storageClass: ceph-rbd
        suffix: cache
        type: persistentVolumeClaim
        globalMounts:
          - path: /opt/app-root/src/.cache/torch/kernels
            subPath: kernels
      run:
        type: emptyDir
        medium: Memory
        sizeLimit: 128Mi
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 128Mi
