---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: calibre
spec:
  chartRef:
    kind: OCIRepository
    name: calibre
  interval: 1h
  values:
    controllers:
      calibre:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/crocodilestick/calibre-web-automated
              tag: v4.0.6@sha256:c31a738b6d5ec6982c050063dd3f063b6943eb1051fc81144789f840d9093a8d
            env:
              TZ: America/New_York
              PUID: 1000
              PGID: 1000
              CWA_PORT_OVERRIDE: &port "8083"
              NETWORK_SHARE_MODE: "true"
            ports:
              - name: http
                containerPort: 8083
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: http
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: http
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: http
                  periodSeconds: 10
                  failureThreshold: 30
            resources:
              requests:
                cpu: 10m
                memory: 512Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    service:
      app:
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.beholdenkey.dev"
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      config:
        enabled: true
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /config

      media:
        type: nfs
        server: titan.internal
        path: /var/nfs/shared/media/library
        globalMounts:
          - path: /media

      calibre-library:
        enabled: true
        type: custom
        volumeSpec:
          nfs:
            server: titan.internal
            path: /var/nfs/shared/media/library/calibre-library
        globalMounts:
          - path: /calibre-library

      ingest:
        enabled: true
        type: custom
        volumeSpec:
          nfs:
            server: titan.internal
            path: /var/nfs/shared/media/library/ingest
        globalMounts:
          - path: /cwa-book-ingest
