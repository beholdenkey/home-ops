---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grimmory
spec:
  chartRef:
    kind: OCIRepository
    name: grimmory
  interval: 1h
  values:
    controllers:
      grimmory:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          mariadb:
            image:
              repository: docker.io/library/mariadb
              tag: 12.2.2-noble
            env:
              MARIADB_DATABASE: grimmory
              MARIADB_PASSWORD: "grimmory"
              MARIADB_ROOT_PASSWORD: "root"
              MARIADB_USER: grimmory
              PGID: "1000"
              PUID: "1000"
              TZ: America/New_York
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - mariadb-admin
                      - ping
                      - --socket=/run/mysqld/mysqld.sock
                      - --user=root
                      - --password=root
            restartPolicy: Always
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              readOnlyRootFilesystem: true
              seccompProfile:
                type: Unconfined

          nginx-config:
            image:
              repository: ghcr.io/grimmory-tools/grimmory
              tag: v2.2.1
            command:
              - /bin/sh
              - -c
            args:
              - "envsubst '$${GRIMMORY_PORT}' < /etc/nginx/nginx.conf > /config/nginx.conf"
            env:
              GRIMMORY_PORT: &port 6060
              TZ: America/New_York
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              readOnlyRootFilesystem: true
              runAsUser: 100
              runAsGroup: 101

        containers:
          grimmory:
            image:
              repository: ghcr.io/grimmory-tools/grimmory
              tag: v2.2.1
            command:
              - java
            args:
              - -jar
              - /app/app.jar
            env:
              DATABASE_PASSWORD: grimmory
              DATABASE_URL: jdbc:mariadb://localhost:3306/grimmory
              DATABASE_USERNAME: grimmory
              TZ: America/New_York
            probes:
              liveness: &appProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/healthcheck
                    port: 8080
              readiness: *appProbe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/healthcheck
                    port: 8080
                  failureThreshold: 10
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              readOnlyRootFilesystem: true

          nginx:
            image:
              repository: ghcr.io/grimmory-tools/grimmory
              tag: v2.2.1
            env:
              TZ: America/New_York
            command:
              - nginx
            args:
              - -c
              - /config/nginx.conf
              - -g
              - "daemon off;"
            probes:
              liveness: &nginxProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
              readiness: *nginxProbe
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              readOnlyRootFilesystem: true
              runAsUser: 100
              runAsGroup: 101
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
    route:
      grimmory:
        hostnames:
          - "{{ .Release.Name }}.beholdenkey.dev"
        parentRefs:
          - name: envoy-internal
            namespace: network
    service:
      grimmory:
        controller: grimmory
        ports:
          http:
            port: *port

    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          grimmory:
            grimmory:
              - path: /app/data
                subPath: app
            mariadb:
              - path: /var/lib/mysql
                subPath: mysql
      media:
        type: nfs
        server: titan.internal
        path: /var/nfs/shared/media
        advancedMounts:
          grimmory:
            grimmory:
              - path: /books
                subPath: library/books
              - path: /bookdrop
                subPath: library/ingest

      mysqld:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Mi
        advancedMounts:
          grimmory:
            mariadb:
              - path: /run/mysqld
      nginx:
        type: emptyDir
        sizeLimit: 200Mi
        advancedMounts:
          grimmory:
            nginx:
              - path: /config
                subPath: config
              - path: /var/lib/nginx/logs
                subPath: log
              - path: /var/lib/nginx/tmp
                subPath: tmp
            nginx-config:
              - path: /config
                subPath: config
      nginx-run:
        type: emptyDir
        medium: Memory
        sizeLimit: 100Mi
        advancedMounts:
          grimmory:
            nginx:
              - path: /run/nginx
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 100Mi
        advancedMounts:
          grimmory:
            grimmory:
              - path: /tmp
            mariadb:
              - path: /tmp

