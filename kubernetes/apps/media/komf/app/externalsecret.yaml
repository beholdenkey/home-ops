---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: komf
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: komf-secret
    template:
      data:
        KOMF_KOMGA_BASE_URI: "http://komga.media.svc.cluster.local:8080"
        KOMF_KOMGA_USER: "{{ .KOMF_KOMGA_USER }}"
        KOMF_KOMGA_PASSWORD: "{{ .KOMF_KOMGA_PASSWORD }}"
        KOMF_METADATA_PROVIDERS_COMIC_VINE_API_KEY: "{{ .KOMF_METADATA_PROVIDERS_COMIC_VINE_API_KEY }}"
        KOMF_METADATA_PROVIDERS_MAL_CLIENT_ID: "{{ .KOMF_METADATA_PROVIDERS_MAL_CLIENT_ID }}"
  dataFrom:
    - extract:
        key: komf
