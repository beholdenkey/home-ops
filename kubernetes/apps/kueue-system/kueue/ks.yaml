---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kueue
spec:
  interval: 1h
  path: ./kubernetes/apps/kueue-system/kueue/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kueue-system
  wait: false
